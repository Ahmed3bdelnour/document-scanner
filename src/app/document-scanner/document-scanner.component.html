<div class="camera-container" [class.android]="userMobileOS === 'Android'">
  <div
    class="loading-camera-message"
    *ngIf="isVideoClosed && !loadingCameraError"
  >
    Loading camera, please wait...
  </div>

  <div
    class="video-and-canvas-container"
    [hidden]="isVideoClosed && !loadingCameraError"
  >
    <video
      id="video"
      playsinline
      autoplay
      loop
      [hidden]="loadingCameraError"
    ></video>
    <canvas id="result" [hidden]="loadingCameraError"></canvas>
  </div>

  <div
    class="controls-and-status-container"
    *ngIf="!isVideoClosed || loadingCameraError"
  >
    <div class="angles-container">
      <img
        class="top-left-angle"
        src="assets/svg/right-angle.svg"
        alt="top left angle icon"
      />
      <img
        class="top-right-angle"
        src="assets/svg/right-angle.svg"
        alt="top right angle icon"
      />
    </div>

    <div class="switch-capturing-mode-btn-container">
      <button class="switch-capturing-mode-btn" (click)="toggleCapturingMode()">
        {{ useAutoCapturing ? "Manual" : "Auto" }}
      </button>
    </div>

    <div class="capturing-message-container">
      <div class="message" *ngIf="useAutoCapturing && isVideoStreaming">
        <ng-container *ngIf="scanResult === 0"
          >Looking for document
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
        </ng-container>

        <ng-container *ngIf="scanResult === 1"
          ><= Get camera closer =></ng-container
        >

        <ng-container *ngIf="scanResult === 2">Cropping...</ng-container>
      </div>
    </div>

    <div class="bottom-controls-container">
      <button
        class="capture-cancel-btn"
        (click)="stopCameraAndFireCloseEvent()"
      >
        <img
          src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZD0iTTAgMGgyNHYyNEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGQ9Ik0xOSA2LjQxTDE3LjU5IDUgMTIgMTAuNTkgNi40MSA1IDUgNi40MSAxMC41OSAxMiA1IDE3LjU5IDYuNDEgMTkgMTIgMTMuNDEgMTcuNTkgMTkgMTkgMTcuNTkgMTMuNDEgMTJ6Ii8+CiAgICA8L2c+Cjwvc3ZnPgo="
          alt="Cancel capture"
        />
      </button>
      <div class="switch-camera-and-capture-btn-container">
        <button
          *ngIf="availableCameras.length > 1"
          class="switch-camera-btn"
          (click)="switchCamera()"
        >
          switch
        </button>

        <button class="capture-image-btn" (click)="captureDocument(true)">
          <img
            src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZD0iTTAgMGgyNHYyNEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiM5QjlCOUIiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTE1IDJsMS44MyAySDIwYzEuMSAwIDIgLjkgMiAydjEyYzAgMS4xLS45IDItMiAySDRjLTEuMSAwLTItLjktMi0yVjZjMC0xLjEuOS0yIDItMmgzLjE3TDkgMmg2em0tMyA1Yy0yLjc2IDAtNSAyLjI0LTUgNXMyLjI0IDUgNSA1IDUtMi4yNCA1LTUtMi4yNC01LTUtNXptMCAxLjhhMy4yIDMuMiAwIDEgMSAwIDYuNCAzLjIgMy4yIDAgMCAxIDAtNi40eiIvPgogICAgPC9nPgo8L3N2Zz4K"
            alt="Capture file"
          />

      </div>

      <button class="file-upload-btn" (click)="fileInput.click()">
        <img
          src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0ibm9uZSIgdmlld0JveD0iMCAwIDI0IDI0Ij4KICAgIDxwYXRoIGZpbGw9IiNmZmYiIGQ9Ik05Ljk2OSA4LjQ4YzAgLjQxNy0uMTUuNzY5LS40NSAxLjA1NS0uMjg2LjI4Ny0uNjMxLjQzLTEuMDM1LjQzLS40MDMgMC0uNzU1LS4xNDMtMS4wNTQtLjQzQzcuMTQzIDkuMjUgNyA4Ljg5NyA3IDguNDhjMC0uNDAzLjE0My0uNzQ4LjQzLTEuMDM1LjMtLjMuNjUtLjQ0OSAxLjA1NC0uNDQ5cy43NS4xNSAxLjAzNi40NWMuMjk5LjI4Ni40NDkuNjMuNDQ5IDEuMDM0em0tNC4wMDQgOC41MTZsMy4wMjctNS4wMiAyLjUgMy4wNDcgMi41LTUuMDU4IDQuMDA0IDcuMDMxSDUuOTY1ek0xOC45OTIgNS4wMDR2MTQuMDA0SDUuMDA4VjUuMDA0aDEzLjk4NHptMS4wMTYtMi4wMTJIMy45OTJjLS4yNzMgMC0uNTA4LjA5OC0uNzAzLjI5My0uMTk1LjE5NS0uMjkzLjQzNi0uMjkzLjcyM3YxNS45OTZjMCAuMjczLjA5OC41MDguMjkzLjcwMy4xOTUuMTk1LjQzLjI5My43MDMuMjkzaDE2LjAxNmMuMjczIDAgLjUwOC0uMDk4LjcwMy0uMjkzLjE5NS0uMTk1LjI5My0uNDMuMjkzLS43MDNWNC4wMDhjMC0uMjg3LS4wOTgtLjUyOC0uMjkzLS43MjMtLjE5NS0uMTk1LS40My0uMjkzLS43MDMtLjI5M3oiLz4KPC9zdmc+Cg=="
          alt="Upload file"
        />
      </button>
      <input
        #fileInput
        type="file"
        hidden
        width="0"
        height="0"
        accept="image/*"
        (change)="handleFileUpload($event)"
      />
    </div>

    <div class="angles-container">
      <img
        class="bottom-left-angle"
        src="assets/svg/right-angle.svg"
        alt="bottom left angle icon"
      />
      <img
        class="bottom-right-angle"
        src="assets//svg/right-angle.svg"
        alt="bottom right angle icon"
      />
    </div>
  </div>
</div>
