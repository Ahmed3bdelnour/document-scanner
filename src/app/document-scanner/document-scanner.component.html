<div class="fax-mobile-scan">
  <input
    id="cameraFileInput"
    type="file"
    accept="image/*"
    capture="environment"
  />

  <button class="btn" (click)="scanDocument()">SCAN</button>

  <div
    class="camera-stream-container"
    [hidden]="!documentScannerService.isStreaming"
  >
    <video id="videoInput"></video>
    <canvas id="canvasOutput"></canvas>
    <button class="capture-image-btn" (click)="captureImage()">capture</button>
  </div>
</div>
