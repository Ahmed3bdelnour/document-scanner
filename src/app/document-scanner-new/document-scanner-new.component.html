<div class="camera-container" [style.height.px]="windowInnerHeight">
  <div
    class="loading-camera-message"
    *ngIf="isVideoClosed && !loadingCameraError"
  >
    Loading camera, please wait...
  </div>

  <div
    class="video-and-canvas-container"
    [hidden]="isVideoClosed && !loadingCameraError"
  >
    <video
      id="video"
      playsinline
      autoplay
      loop
      [hidden]="loadingCameraError"
    ></video>
    <canvas id="result" [hidden]="loadingCameraError"></canvas>

    <div class="capturing-message-container">
      <div class="message" *ngIf="useAutoCapturing && isVideoStreaming">
        <ng-container *ngIf="scanResult === 0"
          >Looking for document
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
        </ng-container>

        <ng-container *ngIf="scanResult === 1"
          ><= Get camera closer =></ng-container
        >

        <ng-container *ngIf="scanResult === 2">Cropping...</ng-container>
      </div>
    </div>

    <button class="cancel-btn" (click)="stopCameraAndFireCloseEvent()">
      <img src="assets/images/times.svg" />
    </button>

    <div class="switch-camera-and-capture-btn-container">
      <button
        *ngIf="availableCameras.length > 1"
        class="switch-camera-btn"
        (click)="switchCamera()"
      >
        switch
      </button>

      <button
        class="capture-image-btn"
        (click)="toggleCapturingMode()"
        [disabled]="loadingCameraError"
      >
        {{ useAutoCapturing ? "Stop" : "Start" }}
      </button>
    </div>

    <button
      class="done-btn"
      (click)="generateDocumentAndClose()"
      [disabled]="!capturedImages.length"
    >
      <img src="assets/images/check-mark.svg" />
    </button>
  </div>

  <div class="captured-documents-container" *ngIf="!isVideoClosed">
    <div
      class="documents-list"
      [perfectScrollbar]="{ suppressScrollY: false }"
      cdkDropList
      cdkDropListOrientation="horizontal"
      [cdkDropListAutoScrollStep]="10"
      (cdkDropListDropped)="drop($event)"
    >
      <div
        *ngFor="let imageURL of capturedImages; let i = index"
        class="image-box"
        cdkDrag
      >
        <div class="drag-handle" cdkDragHandle>
          <img src="assets/images/grab-handler.svg" />
        </div>

        <div class="delete-document" (click)="deleteDocument(i)">
          <img src="assets/images/trash.svg" />
        </div>

        <img class="captured-document" [src]="imageURL" />
      </div>
    </div>
  </div>
</div>
